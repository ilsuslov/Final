{
  "name": "mm2-connector",
  "config": {
    "connector.class": "org.apache.kafka.connect.mirror.MirrorSourceConnector",
    "source.cluster.alias": "cluster1",
    "target.cluster.alias": "cluster2",
    "source.cluster.bootstrap.servers": "kafka-1:9092,kafka-2:9093",
    "target.cluster.bootstrap.servers": "kafka-analytics:9095",
    "topics": "products-raw,products-filtered",
    "replication.factor": "1",
    "refresh.topics.interval.seconds": "10",
    "source.cluster.security.protocol": "SSL",
    "source.cluster.ssl.truststore.location": "/etc/kafka/secrets/truststore.jks",
    "source.cluster.ssl.truststore.password": "changeit",
    "target.cluster.security.protocol": "SSL",
    "target.cluster.ssl.truststore.location": "/etc/kafka/secrets/truststore.jks",
    "target.cluster.ssl.truststore.password": "changeit"
  }
}
